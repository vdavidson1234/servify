spring.application.name=servify
server.port=${PORT:8080}

# ── PostgreSQL ────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/Servify}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# CORS para desarrollo local: Vite, Expo web y celulares en la misma red.
# En produccion conviene reemplazarlo por el dominio real del frontend.
servify.cors.allowed-origin-patterns=${SERVIFY_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://192.168.*.*:*,http://10.*.*.*:*,http://172.*.*.*:*}

# Configurar con los OAuth Client IDs reales antes de usar login social fuera de tests.
# En Expo/React Native el frontend obtiene el idToken y el backend valida issuer, audience,
# expiracion y firma contra los JWKS oficiales del proveedor.
servify.auth.external.google.client-ids=${SERVIFY_GOOGLE_CLIENT_IDS:},348412190909-rs3acgk18an6d1vs0gamd8ai0jao1f5l.apps.googleusercontent.com,348412190909-n02h5cud2d2jgln79mf7i9q9aoec0ju6.apps.googleusercontent.com
servify.auth.external.linkedin.client-ids=${SERVIFY_LINKEDIN_CLIENT_IDS:}
