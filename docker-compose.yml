services:
  db:
    image: postgres:16
    container_name: servify_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: Servify
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - servify_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  servify_data:
